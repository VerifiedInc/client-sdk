name: Pre-release

permissions:
  contents: read
  pull-requests: write

on:
  issue_comment:
    types: [created]

jobs:
  prerelease:
    name: Publish RC to npm
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/prerelease') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)

    steps:
      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('number', context.issue.number);
            return pr.data.head.ref;
          result-encoding: string

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.result }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set RC version
        id: rc
        run: |
          BASE=$(node -p "require('./package.json').version")
          NEXT=$(npm view @verifiedinc-public/client-sdk versions --json 2>/dev/null | \
            jq -r --arg base "$BASE" \
            '[.] | flatten | map(select(startswith($base + "-rc."))) | map(split("-rc.")[1] | tonumber) | max // -1 | . + 1' \
            2>/dev/null || echo "0")
          RC_VERSION="${BASE}-rc.${NEXT}"
          echo "version=${RC_VERSION}" >> $GITHUB_OUTPUT
          npm --no-git-tag-version version "${RC_VERSION}"

      - name: Publish RC
        run: npm publish --tag rc --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: `✅ Pre-release published: \`@verifiedinc-public/client-sdk@${{ steps.rc.outputs.version }}\`\n\nInstall with:\n\`\`\`\nnpm install @verifiedinc-public/client-sdk@${{ steps.rc.outputs.version }}\n\`\`\``,
            });
