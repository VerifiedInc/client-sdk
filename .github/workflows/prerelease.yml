name: Pre-release

permissions:
  contents: read

on:
  push:
    branches-ignore:
      - main

jobs:
  prerelease:
    name: Publish RC to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set RC version
        id: rc
        run: |
          BASE=$(node -p "require('./package.json').version")
          NEXT=$(npm view @verifiedinc-public/client-sdk versions --json 2>/dev/null | \
            jq -r --arg base "$BASE" \
            '[.] | flatten | map(select(startswith($base + "-rc-test."))) | map(split("-rc-test.")[1] | tonumber) | max // -1 | . + 1' \
            2>/dev/null || echo "0")
          RC_VERSION="${BASE}-rc-test.${NEXT}"
          echo "version=${RC_VERSION}" >> $GITHUB_OUTPUT
          npm --no-git-tag-version version "${RC_VERSION}"

      - name: Publish RC
        run: npm publish --tag rc-test --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
